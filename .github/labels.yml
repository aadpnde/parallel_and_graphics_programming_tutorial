# Type (minimum one type label per issue)
- name: 'type: note'
  description: 'Write new note'
  color: '0075ca'

- name: 'type: revise'
  description: 'Rewrite existing note'
  color: '0075ca'

- name: 'type: expand'
  description: 'Add a section, examples, or more detail to an existing note'
  color: '0075ca'

- name: 'type: diagram'
  description: 'Create/ update a visual'
  color: '0075ca'

- name: 'type: example'
  description: 'Add code, exercises, worked problems, etc'
  color: '0075ca'

- name: 'type: docs'
  description: 'Project documentation, NOT the notes themselves'
  color: '0075ca'


